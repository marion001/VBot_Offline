<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>VBot Socket Streaming Test</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --panel: #ffffff;
      --text: #16202a;
      --muted: #657386;
      --line: #d9e0ea;
      --primary: #1167d8;
      --primary-dark: #0d54b3;
      --danger: #c73333;
      --ok: #157347;
      --warn: #a16207;
      --mono: ui-monospace, SFMono-Regular, Consolas, "Liberation Mono", monospace;
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
    }

    main {
      width: min(1120px, calc(100vw - 32px));
      margin: 24px auto;
      display: grid;
      grid-template-columns: minmax(280px, 360px) 1fr;
      gap: 16px;
    }

    section {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 16px;
      box-shadow: 0 8px 24px rgba(20, 40, 70, 0.06);
    }

    h1 {
      width: min(1120px, calc(100vw - 32px));
      margin: 24px auto 0;
      font-size: 24px;
      font-weight: 700;
      letter-spacing: 0;
    }

    h2 {
      margin: 0 0 12px;
      font-size: 16px;
      letter-spacing: 0;
    }

    label {
      display: block;
      margin: 12px 0 6px;
      color: var(--muted);
      font-size: 13px;
    }

    input, select {
      width: 100%;
      height: 38px;
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 0 10px;
      color: var(--text);
      background: #fff;
      font: inherit;
    }

    .row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 14px;
    }

    button {
      height: 38px;
      border: 0;
      border-radius: 6px;
      background: var(--primary);
      color: #fff;
      font-weight: 650;
      cursor: pointer;
    }

    button:hover {
      background: var(--primary-dark);
    }

    button.secondary {
      background: #eef3f9;
      color: var(--text);
      border: 1px solid var(--line);
    }

    button.secondary:hover {
      background: #e4ebf5;
    }

    button.danger {
      background: var(--danger);
    }

    button:disabled {
      opacity: 0.55;
      cursor: not-allowed;
    }

    .status {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin-top: 14px;
    }

    .metric {
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 10px;
      min-height: 58px;
    }

    .metric span {
      display: block;
      color: var(--muted);
      font-size: 12px;
    }

    .metric strong {
      display: block;
      margin-top: 4px;
      font-size: 15px;
      overflow-wrap: anywhere;
    }

    #log {
      height: 520px;
      overflow: auto;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #0f1720;
      color: #d6e2f0;
      padding: 12px;
      font-family: var(--mono);
      font-size: 12px;
      line-height: 1.5;
      white-space: pre-wrap;
    }

    .log-info { color: #d6e2f0; }
    .log-ok { color: #7ee0a1; }
    .log-warn { color: #ffd166; }
    .log-error { color: #ff8a8a; }
    .log-server { color: #8bd3ff; }

    @media (max-width: 820px) {
      main {
        grid-template-columns: 1fr;
      }

      .status {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <h1>VBot Socket Streaming Test</h1>

  <main>
    <section>
      <h2>Kết Nối</h2>

      <label for="serverUrl">WebSocket URL</label>
      <input id="serverUrl" value="ws://192.168.14.175:5003" autocomplete="off">

      <label for="sessionId">Session ID</label>
      <input id="sessionId" autocomplete="off">

      <div class="row">
        <div>
          <label for="sampleRate">Sample rate</label>
          <select id="sampleRate">
            <option value="16000" selected>16000 Hz</option>
            <option value="48000">48000 Hz</option>
          </select>
        </div>
        <div>
          <label for="chunkSize">Frame samples</label>
          <input id="chunkSize" value="512" inputmode="numeric">
        </div>
      </div>

      <div class="actions">
        <button id="connectBtn">Kết nối</button>
        <button id="disconnectBtn" class="secondary" disabled>Ngắt</button>
        <button id="startBtn" disabled>Bật mic</button>
        <button id="stopBtn" class="danger" disabled>Tắt mic</button>
        <button id="wakeBtn" class="secondary" disabled>Start recording</button>
        <button id="clearBtn" class="secondary">Xóa log</button>
      </div>

      <div class="status">
        <div class="metric">
          <span>Socket</span>
          <strong id="socketState">Chưa kết nối</strong>
        </div>
        <div class="metric">
          <span>Mic</span>
          <strong id="micState">Tắt</strong>
        </div>
        <div class="metric">
          <span>Frames</span>
          <strong id="frameCount">0</strong>
        </div>
      </div>
    </section>

    <section>
      <h2>Log</h2>
      <div id="log" aria-live="polite"></div>
    </section>
  </main>

  <script>
    const els = {
      serverUrl: document.getElementById("serverUrl"),
      sessionId: document.getElementById("sessionId"),
      sampleRate: document.getElementById("sampleRate"),
      chunkSize: document.getElementById("chunkSize"),
      connectBtn: document.getElementById("connectBtn"),
      disconnectBtn: document.getElementById("disconnectBtn"),
      startBtn: document.getElementById("startBtn"),
      stopBtn: document.getElementById("stopBtn"),
      wakeBtn: document.getElementById("wakeBtn"),
      clearBtn: document.getElementById("clearBtn"),
      socketState: document.getElementById("socketState"),
      micState: document.getElementById("micState"),
      frameCount: document.getElementById("frameCount"),
      log: document.getElementById("log")
    };

    let socket = null;
    let audioContext = null;
    let mediaStream = null;
    let sourceNode = null;
    let processorNode = null;
    let isRecording = false;
    let frameCount = 0;

    function makeSessionId() {
      return "client_" + Date.now().toString(36) + "_" + Math.random().toString(36).slice(2, 8);
    }

    function log(message, type = "info") {
      const time = new Date().toLocaleTimeString();
      const line = document.createElement("div");
      line.className = "log-" + type;
      line.textContent = `[${time}] ${message}`;
      els.log.appendChild(line);
      els.log.scrollTop = els.log.scrollHeight;
    }

    function setSocketState(text) {
      els.socketState.textContent = text;
    }

    function setMicState(text) {
      els.micState.textContent = text;
    }

    function setConnectedState(connected) {
      els.connectBtn.disabled = connected;
      els.disconnectBtn.disabled = !connected;
      els.startBtn.disabled = !connected || isRecording;
      els.stopBtn.disabled = !connected || !isRecording;
      els.wakeBtn.disabled = !connected;
      setSocketState(connected ? "Đã kết nối" : "Chưa kết nối");
    }

    function ensureSessionId() {
      if (!els.sessionId.value.trim()) {
        els.sessionId.value = makeSessionId();
      }
      return els.sessionId.value.trim();
    }

    function sendText(text) {
      if (!socket || socket.readyState !== WebSocket.OPEN) {
        log("Socket chưa sẵn sàng", "warn");
        return false;
      }
      socket.send(text);
      log("Client -> " + text, "info");
      return true;
    }

    function connectSocket() {
      if (socket && socket.readyState === WebSocket.OPEN) return;

      const url = els.serverUrl.value.trim();
      socket = new WebSocket(url);
      socket.binaryType = "arraybuffer";
      setSocketState("Đang kết nối");

      socket.onopen = () => {
        const sessionId = ensureSessionId();
        setConnectedState(true);
        log("Đã kết nối " + url, "ok");
        sendText(sessionId);
      };

      socket.onmessage = (event) => {
        if (typeof event.data === "string") {
          try {
            const data = JSON.parse(event.data);
            log("Server -> " + JSON.stringify(data, null, 2), "server");
          } catch {
            log("Server -> " + event.data, "server");
          }
        } else {
          log("Server gửi binary " + event.data.byteLength + " bytes", "server");
        }
      };

      socket.onerror = () => {
        log("Lỗi WebSocket", "error");
      };

      socket.onclose = () => {
        log("Socket đã đóng", "warn");
        setConnectedState(false);
        stopRecording(false);
        socket = null;
      };
    }

    function waitForSocketOpen(timeoutMs = 5000) {
      if (socket && socket.readyState === WebSocket.OPEN) {
        return Promise.resolve(true);
      }

      return new Promise((resolve) => {
        const startedAt = Date.now();
        const timer = setInterval(() => {
          if (socket && socket.readyState === WebSocket.OPEN) {
            clearInterval(timer);
            resolve(true);
          } else if (Date.now() - startedAt >= timeoutMs) {
            clearInterval(timer);
            resolve(false);
          }
        }, 50);
      });
    }

    async function ensureSocketConnected() {
      if (!socket || socket.readyState === WebSocket.CLOSED || socket.readyState === WebSocket.CLOSING) {
        connectSocket();
      }
      const ready = await waitForSocketOpen();
      if (!ready) {
        log("Không kết nối được socket để bắt đầu ghi âm", "error");
      }
      return ready;
    }

    function disconnectSocket() {
      stopRecording(true);
      if (socket) {
        socket.close();
      }
    }

    function floatToInt16(floatValue) {
      const clamped = Math.max(-1, Math.min(1, floatValue));
      return clamped < 0 ? clamped * 32768 : clamped * 32767;
    }

    async function startRecording() {
      if (isRecording) return;
      if (!socket || socket.readyState !== WebSocket.OPEN) {
        const ready = await ensureSocketConnected();
        if (!ready) return;
      }

      const sampleRate = Number(els.sampleRate.value) || 16000;
      const chunkSize = Number(els.chunkSize.value) || 512;

      try {
        mediaStream = await navigator.mediaDevices.getUserMedia({
          audio: {
            channelCount: 1,
            echoCancellation: true,
            noiseSuppression: true,
            autoGainControl: true
          }
        });

        audioContext = new (window.AudioContext || window.webkitAudioContext)({ sampleRate });
        sourceNode = audioContext.createMediaStreamSource(mediaStream);
        processorNode = audioContext.createScriptProcessor(chunkSize, 1, 1);

        processorNode.onaudioprocess = (event) => {
          if (!isRecording || !socket || socket.readyState !== WebSocket.OPEN) return;

          const input = event.inputBuffer.getChannelData(0);
          const pcm = new Int16Array(chunkSize);
          for (let i = 0; i < chunkSize; i++) {
            pcm[i] = floatToInt16(input[i] || 0);
          }

          socket.send(pcm.buffer);
          frameCount += 1;
          els.frameCount.textContent = String(frameCount);
        };

        sourceNode.connect(processorNode);
        processorNode.connect(audioContext.destination);
        isRecording = true;
        setMicState("Đang gửi");
        setConnectedState(true);
        log("Đã bật mic, gửi PCM Int16 " + chunkSize + " samples/frame", "ok");
      } catch (error) {
        log("Không mở được microphone: " + error.message, "error");
        stopRecording(false);
      }
    }

    async function startRecordingSession() {
      els.wakeBtn.disabled = true;
      try {
        const socketReady = await ensureSocketConnected();
        if (!socketReady) return;

        if (!isRecording) {
          await startRecording();
        }

        if (!isRecording) {
          log("Mic chưa bật nên không gửi start_recording", "warn");
          return;
        }

        sendText("start_recording");
      } finally {
        els.wakeBtn.disabled = !(socket && socket.readyState === WebSocket.OPEN);
      }
    }

    function stopRecording(sendStopCommand = true) {
      if (!isRecording && !audioContext && !mediaStream) return;

      isRecording = false;

      if (processorNode) {
        processorNode.disconnect();
        processorNode.onaudioprocess = null;
        processorNode = null;
      }
      if (sourceNode) {
        sourceNode.disconnect();
        sourceNode = null;
      }
      if (mediaStream) {
        mediaStream.getTracks().forEach(track => track.stop());
        mediaStream = null;
      }
      if (audioContext) {
        audioContext.close();
        audioContext = null;
      }

      if (sendStopCommand && socket && socket.readyState === WebSocket.OPEN) {
        sendText("stop");
      }

      setMicState("Tắt");
      setConnectedState(Boolean(socket && socket.readyState === WebSocket.OPEN));
      log("Đã tắt mic", "info");
    }

    els.connectBtn.addEventListener("click", connectSocket);
    els.disconnectBtn.addEventListener("click", disconnectSocket);
    els.startBtn.addEventListener("click", startRecording);
    els.stopBtn.addEventListener("click", () => stopRecording(true));
    els.wakeBtn.addEventListener("click", startRecordingSession);
    els.clearBtn.addEventListener("click", () => {
      els.log.textContent = "";
      frameCount = 0;
      els.frameCount.textContent = "0";
    });

    els.sessionId.value = makeSessionId();
    setConnectedState(false);
  </script>
</body>
</html>
